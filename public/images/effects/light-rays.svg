<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradients for light rays -->
    <radialGradient id="ray1" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#7c3aed;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="ray2" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.12" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.04" />
      <stop offset="100%" style="stop-color:#2d1b69;stop-opacity:0" />
    </radialGradient>

    <radialGradient id="ray3" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#5b21b6;stop-opacity:0.03" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Large central ray -->
  <ellipse cx="640" cy="0" rx="600" ry="700" fill="url(#ray1)">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Left ray -->
  <ellipse cx="200" cy="0" rx="350" ry="600" fill="url(#ray2)"
           transform="rotate(-15 200 0)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right ray -->
  <ellipse cx="1080" cy="0" rx="350" ry="600" fill="url(#ray2)"
           transform="rotate(15 1080 0)">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="12s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Subtle diagonal rays -->
  <ellipse cx="400" cy="0" rx="200" ry="500" fill="url(#ray3)"
           transform="rotate(-25 400 0)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="9s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="880" cy="0" rx="200" ry="500" fill="url(#ray3)"
           transform="rotate(25 880 0)">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="11s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Very wide soft glow at top -->
  <ellipse cx="640" cy="-100" rx="900" ry="400" fill="url(#ray1)" opacity="0.4"/>

  <!-- Ambient atmospheric haze -->
  <rect x="0" y="0" width="1280" height="300"
        fill="url(#ray2)" opacity="0.2"/>
</svg>
