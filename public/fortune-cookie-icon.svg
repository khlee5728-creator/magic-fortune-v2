<svg width="200" height="180" viewBox="0 0 200 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Golden cookie gradient (light to dark) -->
    <linearGradient id="cookieLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Dark edges (baked look) -->
    <linearGradient id="cookieDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>

    <!-- 3D shadow gradient -->
    <radialGradient id="cookieShadow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#78350f;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#451a03;stop-opacity:0.8" />
    </radialGradient>

    <!-- Highlight gradient -->
    <radialGradient id="cookieHighlight" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#fde68a;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>

    <!-- Outer glow -->
    <radialGradient id="outerGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer golden glow -->
  <ellipse cx="100" cy="90" rx="90" ry="70" fill="url(#outerGlow)" opacity="0.5"/>

  <!-- Ground shadow (cookie sitting on surface) -->
  <ellipse cx="100" cy="155" rx="60" ry="8" fill="#451a03" opacity="0.3"/>

  <!-- Back half of cookie (darker, behind) -->
  <g filter="url(#shadow)">
    <!-- Right back half (3D folded shape) -->
    <path d="M 100 50
             Q 130 40, 150 60
             Q 160 80, 155 100
             Q 150 120, 135 135
             Q 120 145, 100 145
             Q 100 120, 100 90
             Z"
          fill="url(#cookieDark)"
          opacity="0.7"/>

    <!-- Shadow on back half -->
    <path d="M 100 50
             Q 130 40, 150 60
             Q 160 80, 155 100
             Q 150 120, 135 135
             Q 120 145, 100 145
             Q 100 120, 100 90
             Z"
          fill="url(#cookieShadow)"
          opacity="0.5"/>
  </g>

  <!-- Paper fortune sticking out (middle layer) -->
  <g filter="url(#glow)">
    <!-- Paper piece -->
    <rect x="85" y="80" width="30" height="45"
          fill="#fef3c7"
          stroke="#fbbf24"
          stroke-width="1"
          rx="2"
          transform="rotate(-5, 100, 100)"/>

    <!-- Text lines on paper -->
    <line x1="88" y1="88" x2="112" y2="87" stroke="#d97706" stroke-width="0.8" opacity="0.6"/>
    <line x1="88" y1="93" x2="112" y2="92" stroke="#d97706" stroke-width="0.8" opacity="0.6"/>
    <line x1="88" y1="98" x2="110" y2="97" stroke="#d97706" stroke-width="0.8" opacity="0.6"/>
    <line x1="88" y1="103" x2="108" y2="102" stroke="#d97706" stroke-width="0.8" opacity="0.5"/>
    <line x1="88" y1="108" x2="112" y2="107" stroke="#d97706" stroke-width="0.8" opacity="0.5"/>
    <line x1="88" y1="113" x2="106" y2="112" stroke="#d97706" stroke-width="0.8" opacity="0.5"/>

    <!-- Paper fold/crease -->
    <line x1="100" y1="80" x2="100" y2="125" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>

    <!-- Fortune text hint (small symbol) -->
    <text x="100" y="120" font-family="serif" font-size="8" fill="#d97706"
          text-anchor="middle" font-style="italic" opacity="0.7">✦</text>
  </g>

  <!-- Front half of cookie (lighter, in front) -->
  <g filter="url(#shadow)">
    <!-- Left front half (3D folded shape) -->
    <path d="M 100 50
             Q 70 40, 50 60
             Q 40 80, 45 100
             Q 50 120, 65 135
             Q 80 145, 100 145
             Q 100 120, 100 90
             Z"
          fill="url(#cookieLight)"/>

    <!-- 3D highlight on front -->
    <path d="M 100 50
             Q 70 40, 50 60
             Q 40 80, 45 100
             Q 50 120, 65 135
             Q 80 145, 100 145
             Q 100 120, 100 90
             Z"
          fill="url(#cookieHighlight)"
          opacity="0.6"/>

    <!-- Edge darkening (baked edges) -->
    <path d="M 100 50 Q 70 40, 50 60"
          stroke="url(#cookieDark)" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M 50 60 Q 40 80, 45 100"
          stroke="url(#cookieDark)" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M 45 100 Q 50 120, 65 135"
          stroke="url(#cookieDark)" stroke-width="2.5" fill="none" opacity="0.4"/>
    <path d="M 65 135 Q 80 145, 100 145"
          stroke="url(#cookieDark)" stroke-width="3" fill="none" opacity="0.5"/>
  </g>

  <!-- Cookie texture (bubbles and dots) -->
  <g opacity="0.4">
    <!-- Small air bubbles -->
    <circle cx="60" cy="70" r="2" fill="#b45309"/>
    <circle cx="75" cy="85" r="1.5" fill="#b45309"/>
    <circle cx="55" cy="100" r="1.8" fill="#b45309"/>
    <circle cx="70" cy="110" r="1.3" fill="#b45309"/>
    <circle cx="82" cy="95" r="1.6" fill="#b45309"/>
    <circle cx="65" cy="125" r="1.4" fill="#b45309"/>
    <circle cx="145" cy="70" r="2" fill="#92400e"/>
    <circle cx="130" cy="85" r="1.5" fill="#92400e"/>
    <circle cx="150" cy="100" r="1.8" fill="#92400e"/>
    <circle cx="135" cy="110" r="1.3" fill="#92400e"/>
    <circle cx="120" cy="95" r="1.6" fill="#92400e"/>
    <circle cx="140" cy="125" r="1.4" fill="#92400e"/>
  </g>

  <!-- Crack lines (cookie breaking open) -->
  <g opacity="0.7">
    <!-- Center crack -->
    <path d="M 100 50 Q 98 70, 100 90"
          stroke="#92400e" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 100 90 Q 102 110, 100 145"
          stroke="#92400e" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Small branch cracks -->
    <path d="M 98 75 L 90 78"
          stroke="#92400e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 102 75 L 110 78"
          stroke="#92400e" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M 98 100 L 92 105"
          stroke="#92400e" stroke-width="1.3" stroke-linecap="round" fill="none"/>
    <path d="M 102 100 L 108 105"
          stroke="#92400e" stroke-width="1.3" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Bright highlights (shiny baked surface) -->
  <g opacity="0.8">
    <ellipse cx="65" cy="75" rx="12" ry="8" fill="#fef3c7" opacity="0.6"/>
    <ellipse cx="60" cy="70" rx="6" ry="4" fill="#ffffff" opacity="0.7"/>
    <ellipse cx="130" cy="90" rx="10" ry="6" fill="#fde68a" opacity="0.4"/>
  </g>

  <!-- Cookie crumbs (fallen pieces) -->
  <g opacity="0.5">
    <circle cx="40" cy="150" r="2" fill="#d97706"/>
    <ellipse cx="45" cy="152" rx="1.5" ry="1" fill="#d97706"/>
    <circle cx="155" cy="148" r="2.5" fill="#d97706"/>
    <ellipse cx="160" cy="150" rx="2" ry="1.2" fill="#d97706"/>
    <circle cx="100" cy="152" r="1.5" fill="#fbbf24"/>
  </g>

  <!-- Sparkles (magical fortune cookie) -->
  <g>
    <circle cx="25" cy="70" r="2" fill="#fef3c7">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="75" r="2.5" fill="#fef3c7">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="25" r="1.8" fill="#fde68a">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="140" r="2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="140" r="2.2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Star sparkles -->
  <g opacity="0.9">
    <path d="M 30 50 L 31 53 L 34 53 L 31.5 55 L 32.5 58 L 30 56 L 27.5 58 L 28.5 55 L 26 53 L 29 53 Z"
          fill="#fde68a">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 170 55 L 171 58 L 174 58 L 171.5 60 L 172.5 63 L 170 61 L 167.5 63 L 168.5 60 L 166 58 L 169 58 Z"
          fill="#fde68a">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Gentle floating animation -->
  <animateTransform
    attributeName="transform"
    type="translate"
    values="0 0; 0 -3; 0 0"
    dur="3s"
    repeatCount="indefinite"/>
</svg>
