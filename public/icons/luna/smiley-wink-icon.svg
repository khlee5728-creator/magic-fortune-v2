<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Skin tone gradient (peachy/ivory) -->
    <radialGradient id="skinTone" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#fff5eb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fef3e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde8d4;stop-opacity:1" />
    </radialGradient>

    <!-- Purple gradient for hair (dark to light) -->
    <linearGradient id="hairPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>

    <!-- Dark gradient for witch hat -->
    <linearGradient id="hatDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>

    <!-- Purple band for hat -->
    <linearGradient id="hatBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>

    <!-- Gold for moon decoration -->
    <radialGradient id="moonGold">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </radialGradient>

    <!-- Purple glow -->
    <radialGradient id="purpleGlow">
      <stop offset="0%" style="stop-color:#d8b4fe;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="50" cy="55" r="40" fill="url(#purpleGlow)" opacity="0.4"/>

  <!-- LAYER 1: Back hair (behind everything) -->
  <g filter="url(#glow)">
    <!-- Hair flowing behind head (fuller back layer) - EXTENDED LENGTH -->
    <ellipse cx="50" cy="52" rx="18" ry="26" fill="url(#hairPurple)" opacity="0.7"/>

    <!-- Back hair strands - LONGER -->
    <path d="M 35 45 Q 30 50 28 58 Q 27 66 30 75"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.6"/>
    <path d="M 65 45 Q 70 50 72 58 Q 73 66 70 75"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.6"/>

    <!-- Additional back hair for volume -->
    <path d="M 40 46 Q 35 52 33 60 Q 32 68 35 76"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.5"/>
    <path d="M 60 46 Q 65 52 67 60 Q 68 68 65 76"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- LAYER 2: Face (Luna's cute face!) -->
  <g filter="url(#glow)">
    <!-- Face circle -->
    <circle cx="50" cy="55" r="22" fill="url(#skinTone)"
            stroke="#fde8d4" stroke-width="1.5"/>

    <!-- Face shadow (depth) -->
    <circle cx="52" cy="57" r="22" fill="#f59e0b" opacity="0.05"/>

    <!-- Face highlight -->
    <ellipse cx="43" cy="48" rx="8" ry="10" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- LAYER 3: Forehead hairline (hair peeking under hat) -->
  <g>
    <!-- Small bangs/hairline under hat -->
    <path d="M 35 42 Q 40 40 45 41 Q 50 42 55 41 Q 60 40 65 42"
          fill="url(#hairPurple)" opacity="0.8"/>
    <path d="M 38 42 Q 42 41 46 42 Q 50 43 54 42 Q 58 41 62 42"
          fill="#6b21a8" opacity="0.5"/>
  </g>

  <!-- LAYER 4: Side hair (flowing on sides of face) -->
  <g filter="url(#glow)">
    <!-- Left hair wave (layered, in front of face) - EXTENDED & MORE VOLUMINOUS -->
    <!-- Longest outer layer with curl -->
    <path d="M 28 45 Q 22 50 19 58 Q 17 66 19 74 Q 21 76 23 75 Q 25 72 26 68"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.9"/>
    <!-- Middle layer -->
    <path d="M 30 46 Q 25 51 23 58 Q 22 65 24 72 Q 26 70 28 66 Q 30 60 31 55"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.85"/>
    <!-- Inner layer -->
    <path d="M 33 48 Q 29 53 27 59 Q 26 65 28 70 Q 30 68 32 64 Q 34 59 35 54"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.8"/>
    <!-- Innermost short layer -->
    <path d="M 36 50 Q 33 55 32 60 Q 31 64 33 67 Q 35 65 37 61 Q 38 57 38 53"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.75"/>

    <!-- Right hair wave (layered, in front of face) - EXTENDED & MORE VOLUMINOUS -->
    <!-- Longest outer layer with curl -->
    <path d="M 72 45 Q 78 50 81 58 Q 83 66 81 74 Q 79 76 77 75 Q 75 72 74 68"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.9"/>
    <!-- Middle layer -->
    <path d="M 70 46 Q 75 51 77 58 Q 78 65 76 72 Q 74 70 72 66 Q 70 60 69 55"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.85"/>
    <!-- Inner layer -->
    <path d="M 67 48 Q 71 53 73 59 Q 74 65 72 70 Q 70 68 68 64 Q 66 59 65 54"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.8"/>
    <!-- Innermost short layer -->
    <path d="M 64 50 Q 67 55 68 60 Q 69 64 67 67 Q 65 65 63 61 Q 62 57 62 53"
          fill="url(#hairPurple)" stroke="#6b21a8" stroke-width="1" opacity="0.75"/>

    <!-- Hair highlights (shine) - repositioned for longer hair -->
    <ellipse cx="25" cy="58" rx="2" ry="5" fill="#c084fc" opacity="0.5"/>
    <ellipse cx="75" cy="58" rx="2" ry="5" fill="#c084fc" opacity="0.5"/>
    <ellipse cx="28" cy="68" rx="1.5" ry="3" fill="#c084fc" opacity="0.4"/>
    <ellipse cx="72" cy="68" rx="1.5" ry="3" fill="#c084fc" opacity="0.4"/>
  </g>

  <!-- LAYER 5: Witch hat (ON TOP - Luna's signature!) -->
  <g filter="url(#glow)">
    <!-- Hat cone (pointed top) - slightly tilted for cuteness -->
    <path d="M 50 15 L 28 42 L 72 42 Z"
          fill="url(#hatDark)" stroke="#0f0f1e" stroke-width="1.5"/>

    <!-- Hat brim (wide circular edge) - positioned closer to head -->
    <ellipse cx="50" cy="42" rx="28" ry="6"
             fill="url(#hatDark)" stroke="#0f0f1e" stroke-width="1.5"/>

    <!-- Hat band (purple ribbon) -->
    <ellipse cx="50" cy="39" rx="22" ry="3"
             fill="url(#hatBand)"/>

    <!-- Crescent moon decoration (gold) -->
    <g>
      <path d="M 54 35 Q 57 33 58 30 Q 57 33 60 35 Q 57 34 58 37 Q 57 34 54 35 Z"
            fill="url(#moonGold)" stroke="#f59e0b" stroke-width="0.8">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </path>
      <!-- Moon sparkle -->
      <circle cx="58" cy="34" r="0.8" fill="#fef3c7">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Hat highlight (shine) -->
    <ellipse cx="40" cy="28" rx="8" ry="4" fill="#ffffff" opacity="0.15"/>
    <ellipse cx="42" cy="30" rx="5" ry="2" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- LAYER 6: Eyes (big anime-style) -->
  <g>
    <!-- Left eye (open, sparkling) -->
    <ellipse cx="42" cy="52" rx="4.5" ry="6" fill="#ffffff"/>
    <ellipse cx="42" cy="52" rx="3.5" ry="5" fill="#8b5cf6"/>
    <circle cx="42" cy="52" r="2.5" fill="#1e1b4b"/>

    <!-- Eye shine (large highlight) -->
    <ellipse cx="40" cy="50" rx="2" ry="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="39.5" cy="49" r="1" fill="#ffffff"/>

    <!-- Eye sparkle -->
    <circle cx="45" cy="50" r="0.8" fill="#fbbf24">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Right eye (winking!) -->
    <g>
      <!-- Winking arc -->
      <path d="M 54 52 Q 58 50 62 52"
            stroke="#6b21a8" stroke-width="2.5"
            stroke-linecap="round" fill="none">
        <animate attributeName="d"
                 values="M 54 52 Q 58 50 62 52;
                         M 54 52 Q 58 52 62 52;
                         M 54 52 Q 58 50 62 52"
                 dur="3s" repeatCount="indefinite"/>
      </path>

      <!-- Eyelashes (cute!) -->
      <path d="M 55 50 L 53 48" stroke="#6b21a8" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <path d="M 58 49 L 58 46" stroke="#6b21a8" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
      <path d="M 61 50 L 63 48" stroke="#6b21a8" stroke-width="1" stroke-linecap="round" opacity="0.7"/>

      <!-- Wink sparkle -->
      <circle cx="64" cy="50" r="1.2" fill="#fbbf24">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <path d="M 64 47 L 64 49 M 62 48 L 66 48" stroke="#fbbf24" stroke-width="0.8" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- Nose (small cute) -->
  <ellipse cx="50" cy="58" rx="1" ry="1.5" fill="#fbbf24" opacity="0.3"/>

  <!-- Smile (playful) -->
  <path d="M 38 62 Q 50 70 62 62"
        stroke="#c084fc" stroke-width="2.5"
        stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Smile highlight -->
  <path d="M 45 65 Q 50 67 55 65"
        stroke="#ffffff" stroke-width="1.2"
        stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Blush (rosy cheeks) -->
  <ellipse cx="33" cy="58" rx="4" ry="3" fill="#f0abfc" opacity="0.4"/>
  <ellipse cx="32" cy="57.5" rx="2.5" ry="2" fill="#fae8ff" opacity="0.6"/>
  <ellipse cx="67" cy="58" rx="4" ry="3" fill="#f0abfc" opacity="0.4"/>
  <ellipse cx="66" cy="57.5" rx="2.5" ry="2" fill="#fae8ff" opacity="0.6"/>

  <!-- Magic sparkles (Luna's magical aura) -->
  <g>
    <!-- Star sparkles -->
    <path d="M 22 42 L 23 45 L 25.5 45 L 23.5 46.5 L 24 49 L 22 47.5 L 20 49 L 20.5 46.5 L 18.5 45 L 21 45 Z"
          fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 78 40 L 79 43 L 81.5 43 L 79.5 44.5 L 80 47 L 78 45.5 L 76 47 L 76.5 44.5 L 74.5 43 L 77 43 Z"
          fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </path>

    <!-- Circle sparkles -->
    <circle cx="18" cy="58" r="1.5" fill="#fbbf24">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="82" cy="60" r="1.2" fill="#c084fc">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="72" r="1.3" fill="#fbbf24">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="70" r="1" fill="#c084fc">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Purple magic hearts (TMI = love/secrets) -->
  <g>
    <path d="M 85 25 Q 87 22 90 25 Q 93 22 95 25 Q 95 30 90 33 Q 85 30 85 25 Z"
          fill="#f0abfc" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 10 30 Q 12 27 15 30 Q 18 27 20 30 Q 20 35 15 38 Q 10 35 10 30 Z"
          fill="#c084fc" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Floating animation (gentle bob) -->
  <animateTransform
    attributeName="transform"
    type="translate"
    values="0 0; 0 -2; 0 0"
    dur="3s"
    repeatCount="indefinite"/>
</svg>
