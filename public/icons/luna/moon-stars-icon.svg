<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple gradient for moon -->
    <linearGradient id="moonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8b4fe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>

    <!-- Gold gradient for stars -->
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="moonGlow">
      <stop offset="0%" style="stop-color:#d8b4fe;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow with atmospheric halo -->
  <circle cx="35" cy="50" r="30" fill="url(#moonGlow)" opacity="0.4"/>
  <circle cx="35" cy="50" r="25" fill="url(#moonGlow)" opacity="0.25">
    <animate attributeName="r" values="24;27;24" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Crescent moon (using two circles to create crescent) -->
  <circle cx="35" cy="50" r="22" fill="url(#moonGradient)" filter="url(#glow)"/>
  <circle cx="42" cy="50" r="18" fill="#1e1b4b"/>

  <!-- Enhanced moon craters (3D texture with shadows) -->
  <circle cx="28" cy="45" r="2.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="29" cy="44" r="1" fill="#d8b4fe" opacity="0.6"/>
  <circle cx="32" cy="56" r="1.8" fill="#a78bfa" opacity="0.3"/>
  <circle cx="32.5" cy="55.5" r="0.8" fill="#d8b4fe" opacity="0.5"/>
  <circle cx="25" cy="52" r="1.5" fill="#a78bfa" opacity="0.3"/>
  <circle cx="25.5" cy="51.5" r="0.7" fill="#d8b4fe" opacity="0.5"/>

  <!-- Additional smaller craters for detail -->
  <circle cx="30" cy="50" r="1.2" fill="#a78bfa" opacity="0.25"/>
  <circle cx="27" cy="48" r="0.9" fill="#a78bfa" opacity="0.2"/>

  <!-- Enhanced light reflection on moon (multi-layer) -->
  <ellipse cx="30" cy="44" rx="3.5" ry="6" fill="#f3e8ff" opacity="0.4"/>
  <ellipse cx="29" cy="43" rx="2" ry="3.5" fill="#ffffff" opacity="0.6"/>

  <!-- Stars (5-pointed stars with enhanced 3D depth) -->
  <!-- Top right star (large) -->
  <g filter="url(#glow)">
    <path d="M 70 25 L 72 31 L 78 31 L 73 35 L 75 41 L 70 37 L 65 41 L 67 35 L 62 31 L 68 31 Z"
          fill="url(#starGradient)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Bright core -->
    <circle cx="70" cy="33" r="2.5" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="33" r="1.2" fill="#fef3c7">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Middle right star (medium) -->
  <g filter="url(#glow)">
    <path d="M 75 52 L 76.5 56 L 80.5 56 L 77 59 L 78.5 63 L 75 60 L 71.5 63 L 73 59 L 69.5 56 L 73.5 56 Z"
          fill="url(#starGradient)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <!-- Bright core -->
    <circle cx="75" cy="58" r="2" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="75" cy="58" r="1" fill="#fef3c7">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom right star (small) -->
  <g filter="url(#glow)">
    <path d="M 68 73 L 69 76 L 72 76 L 69.5 78 L 70.5 81 L 68 79 L 65.5 81 L 66.5 78 L 64 76 L 67 76 Z"
          fill="url(#starGradient)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <!-- Bright core -->
    <circle cx="68" cy="77" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Enhanced small sparkles (stardust effect) -->
  <circle cx="55" cy="35" r="1.5" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="45" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="65" r="1" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Additional stardust -->
  <circle cx="50" cy="30" r="0.8" fill="#fde68a" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="38" r="0.7" fill="#fde68a" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="22" r="0.6" fill="#fde68a" opacity="0.4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="68" r="0.9" fill="#fde68a" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
