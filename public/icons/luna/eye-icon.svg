<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Purple gradient for crystal ball -->
    <radialGradient id="crystalGradient" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#e9d5ff;stop-opacity:0.3" />
      <stop offset="30%" style="stop-color:#c084fc;stop-opacity:0.6" />
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.9" />
    </radialGradient>

    <!-- Gold gradient for base -->
    <linearGradient id="goldBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Purple glow -->
    <radialGradient id="crystalGlow">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>

    <!-- Inner universe gradient -->
    <radialGradient id="universeGradient">
      <stop offset="0%" style="stop-color:#312e81;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#1e1b4b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#0c0a1f;stop-opacity:1" />
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft blur for nebula -->
    <filter id="nebula">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Outer glow (pulsing) -->
  <circle cx="50" cy="45" r="38" fill="url(#crystalGlow)" opacity="0.5">
    <animate attributeName="r" values="35;42;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Base/Stand (enhanced) -->
  <g filter="url(#glow)">
    <!-- Base bottom ellipse -->
    <ellipse cx="50" cy="78" rx="20" ry="4" fill="url(#goldBase)" opacity="0.9"/>

    <!-- Base pillar -->
    <path d="M 45 72 L 43 78 L 57 78 L 55 72 Z" fill="url(#goldBase)"/>

    <!-- Base top -->
    <ellipse cx="50" cy="72" rx="5" ry="2" fill="#fde68a"/>

    <!-- Enhanced decorative patterns on base -->
    <circle cx="44" cy="76" r="0.8" fill="#d97706" opacity="0.5"/>
    <circle cx="50" cy="76" r="0.8" fill="#d97706" opacity="0.5"/>
    <circle cx="56" cy="76" r="0.8" fill="#d97706" opacity="0.5"/>

    <!-- Additional ornamental lines -->
    <path d="M 44 75 L 44 77" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
    <path d="M 50 75 L 50 77" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
    <path d="M 56 75 L 56 77" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>

    <!-- Base rim decoration -->
    <ellipse cx="50" cy="78" rx="21" ry="4.5" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Crystal Ball - outer glass sphere -->
  <g filter="url(#glow)">
    <circle cx="50" cy="45" r="26" fill="url(#crystalGradient)"
            stroke="#c084fc" stroke-width="1.5" opacity="0.95"/>
  </g>

  <!-- Inner universe/galaxy (rotating) -->
  <g>
    <animateTransform
      attributeName="transform"
      type="rotate"
      values="0 50 45; 360 50 45"
      dur="10s"
      repeatCount="indefinite"/>

    <!-- Nebula clouds -->
    <circle cx="48" cy="42" r="8" fill="#7c3aed" opacity="0.4" filter="url(#nebula)"/>
    <circle cx="54" cy="48" r="6" fill="#a78bfa" opacity="0.3" filter="url(#nebula)"/>
    <circle cx="47" cy="50" r="5" fill="#c084fc" opacity="0.3" filter="url(#nebula)"/>

    <!-- Stars inside (increased from 5 to 10) -->
    <circle cx="45" cy="40" r="1.5" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="55" cy="43" r="1.2" fill="#fde68a">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="50" r="1" fill="#fbbf24">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="48" cy="48" r="0.8" fill="#fde68a">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="45" r="1.3" fill="#fbbf24">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="43" cy="45" r="0.9" fill="#fde68a">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="57" cy="48" r="1.1" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46" cy="52" r="0.7" fill="#fde68a">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="54" cy="45" r="1" fill="#fbbf24">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="49" cy="41" r="0.8" fill="#fde68a">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Enhanced light reflection on crystal ball surface (3 layers) -->
  <ellipse cx="42" cy="37" rx="8" ry="12" fill="#ffffff" opacity="0.3"/>
  <ellipse cx="40" cy="35" rx="5" ry="8" fill="#ffffff" opacity="0.5"/>
  <ellipse cx="39" cy="33" rx="3" ry="5" fill="#ffffff" opacity="0.8"/>

  <!-- Enhanced glass shine effects -->
  <path d="M 35 35 Q 40 32 45 35" stroke="#ffffff" stroke-width="1.8"
        stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M 38 42 Q 42 40 46 42" stroke="#ffffff" stroke-width="1.2"
        stroke-linecap="round" fill="none" opacity="0.4"/>

  <!-- Outer sparkles -->
  <circle cx="25" cy="30" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="35" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="55" r="1.3" fill="#fbbf24">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="50" r="1" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="20" r="1.2" fill="#fbbf24">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="25" r="1.4" fill="#fde68a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/>
  </circle>

  <!-- Magic sparkle lines around ball -->
  <g opacity="0.5">
    <line x1="25" y1="45" x2="20" y2="45" stroke="#c084fc" stroke-width="1" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </line>
    <line x1="75" y1="45" x2="80" y2="45" stroke="#c084fc" stroke-width="1" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="50" y1="20" x2="50" y2="15" stroke="#c084fc" stroke-width="1" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Base glow -->
  <ellipse cx="50" cy="78" rx="22" ry="5" fill="#fbbf24" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.3;0.1" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>
