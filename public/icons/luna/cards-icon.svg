<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient for cards -->
    <linearGradient id="cardGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Purple gradient for card back -->
    <linearGradient id="cardPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="cardGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <ellipse cx="50" cy="50" rx="45" ry="45" fill="url(#cardGlow)" opacity="0.3"/>

  <!-- Left card (rotated left) with enhanced details -->
  <g transform="rotate(-15 30 50)">
    <rect x="18" y="25" width="24" height="36" rx="3"
          fill="url(#cardPurple)" stroke="url(#cardGold)" stroke-width="2"/>
    <rect x="20" y="27" width="20" height="32" rx="2"
          fill="none" stroke="url(#cardGold)" stroke-width="1" opacity="0.5"/>

    <!-- Corner ornaments -->
    <circle cx="22" cy="29" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="38" cy="29" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="22" cy="57" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="38" cy="57" r="0.8" fill="url(#cardGold)" opacity="0.7"/>

    <!-- Enhanced sun symbol (detailed rays) -->
    <circle cx="30" cy="43" r="4" fill="url(#cardGold)" opacity="0.7"/>
    <path d="M 30 37 L 30 39 M 30 47 L 30 49 M 24 43 L 26 43 M 34 43 L 36 43"
          stroke="url(#cardGold)" stroke-width="1.2" opacity="0.7"/>
    <path d="M 25.5 38.5 L 26.8 39.8 M 33.2 46.2 L 34.5 47.5 M 25.5 47.5 L 26.8 46.2 M 33.2 39.8 L 34.5 38.5"
          stroke="url(#cardGold)" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Center card (main, no rotation) with enhanced mystic symbol -->
  <g filter="url(#glow)">
    <rect x="38" y="20" width="24" height="36" rx="3"
          fill="url(#cardPurple)" stroke="url(#cardGold)" stroke-width="2.5"/>
    <rect x="40" y="22" width="20" height="32" rx="2"
          fill="none" stroke="url(#cardGold)" stroke-width="1.5" opacity="0.6"/>

    <!-- Corner ornaments (more elaborate) -->
    <path d="M 42 24 L 44 24 L 42 26 Z" fill="url(#cardGold)" opacity="0.8"/>
    <path d="M 58 24 L 56 24 L 58 26 Z" fill="url(#cardGold)" opacity="0.8"/>
    <path d="M 42 50 L 44 50 L 42 48 Z" fill="url(#cardGold)" opacity="0.8"/>
    <path d="M 58 50 L 56 50 L 58 48 Z" fill="url(#cardGold)" opacity="0.8"/>

    <!-- Enhanced mystical eye + star symbol -->
    <path d="M 50 30 L 52 36 L 58 36 L 53 40 L 55 46 L 50 42 L 45 46 L 47 40 L 42 36 L 48 36 Z"
          fill="url(#cardGold)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Mystical eye (enhanced with iris and pupil) -->
    <ellipse cx="50" cy="38" rx="3" ry="2" fill="#e9d5ff" opacity="0.9"/>
    <ellipse cx="50" cy="38" rx="2" ry="1.3" fill="#c084fc"/>
    <circle cx="50" cy="38" r="0.8" fill="#7c3aed"/>
    <circle cx="50.3" cy="37.7" r="0.3" fill="#ffffff" opacity="0.8"/>

    <!-- Decorative lines around eye -->
    <path d="M 45 38 Q 47 37 48 38" stroke="url(#cardGold)" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M 55 38 Q 53 37 52 38" stroke="url(#cardGold)" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Right card (rotated right) with enhanced details -->
  <g transform="rotate(15 70 50)">
    <rect x="58" y="25" width="24" height="36" rx="3"
          fill="url(#cardPurple)" stroke="url(#cardGold)" stroke-width="2"/>
    <rect x="60" y="27" width="20" height="32" rx="2"
          fill="none" stroke="url(#cardGold)" stroke-width="1" opacity="0.5"/>

    <!-- Corner ornaments -->
    <circle cx="62" cy="29" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="78" cy="29" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="62" cy="57" r="0.8" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="78" cy="57" r="0.8" fill="url(#cardGold)" opacity="0.7"/>

    <!-- Enhanced crescent moon (more detailed) -->
    <circle cx="70" cy="43" r="4" fill="url(#cardGold)" opacity="0.7"/>
    <circle cx="72" cy="43" r="3.5" fill="url(#cardPurple)"/>

    <!-- Moon craters -->
    <circle cx="68" cy="42" r="0.6" fill="url(#cardGold)" opacity="0.4"/>
    <circle cx="69.5" cy="44.5" r="0.5" fill="url(#cardGold)" opacity="0.3"/>

    <!-- Small stars around moon -->
    <circle cx="66" cy="39" r="0.6" fill="url(#cardGold)" opacity="0.6"/>
    <circle cx="74" cy="40" r="0.5" fill="url(#cardGold)" opacity="0.5"/>
    <circle cx="73" cy="47" r="0.7" fill="url(#cardGold)" opacity="0.6"/>
  </g>

  <!-- Floating sparkles -->
  <circle cx="25" cy="20" r="1.5" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="18" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="10" r="1.3" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="70" r="1" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="72" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle animation - cards gently sway -->
  <animateTransform
    attributeName="transform"
    type="rotate"
    values="0 50 50; 2 50 50; 0 50 50; -2 50 50; 0 50 50"
    dur="6s"
    repeatCount="indefinite"/>
</svg>
