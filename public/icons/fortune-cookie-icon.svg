<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main cookie gradient (left to right) -->
    <linearGradient id="cookieLight" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" style="stop-color:#F5B675;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F0A85F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E89850;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow gradient -->
    <linearGradient id="cookieDark" x1="100%" y1="30%" x2="0%" y2="70%">
      <stop offset="0%" style="stop-color:#D48A42;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C67028;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A65628;stop-opacity:1" />
    </linearGradient>

    <!-- Inner hollow -->
    <radialGradient id="innerDark">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D2E10;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Rotate entire cookie for natural tilt -->
  <g transform="rotate(-12, 100, 100)">

    <!-- Back wing (right, darker) -->
    <path d="M 100 80
             C 120 75, 145 70, 165 75
             C 175 78, 180 85, 178 95
             C 175 110, 165 120, 150 125
             C 130 132, 110 128, 100 120
             L 100 80
             Z"
          fill="url(#cookieDark)"
          stroke="#703A1F"
          stroke-width="3"
          stroke-linejoin="round"/>

    <!-- Front wing (left, lighter) -->
    <path d="M 100 80
             C 80 75, 55 70, 35 75
             C 25 78, 20 85, 22 95
             C 25 110, 35 120, 50 125
             C 70 132, 90 128, 100 120
             L 100 80
             Z"
          fill="url(#cookieLight)"
          stroke="#703A1F"
          stroke-width="3"
          stroke-linejoin="round"/>

    <!-- Center hollow opening (vertical ellipse) -->
    <ellipse cx="100" cy="100" rx="25" ry="40"
             fill="url(#innerDark)"/>

    <!-- Main highlight on left wing -->
    <ellipse cx="45" cy="85" rx="22" ry="16"
             fill="#FFFDF0"
             opacity="0.7"
             transform="rotate(-25, 45, 85)"/>

    <!-- Secondary highlight -->
    <ellipse cx="38" cy="80" rx="10" ry="7"
             fill="#FFFFFF"
             opacity="0.85"
             transform="rotate(-25, 38, 80)"/>

    <!-- Right wing subtle highlight -->
    <ellipse cx="155" cy="90" rx="16" ry="12"
             fill="#FFFFFF"
             opacity="0.25"
             transform="rotate(20, 155, 90)"/>

    <!-- Bottom highlights -->
    <ellipse cx="50" cy="115" rx="15" ry="10"
             fill="#FFFFFF"
             opacity="0.2"/>
    <ellipse cx="150" cy="115" rx="14" ry="9"
             fill="#FFFFFF"
             opacity="0.15"/>

    <!-- Paper fortune (bottom center) -->
    <g>
      <!-- Main paper -->
      <rect x="90" y="115" width="20" height="45"
            fill="#FFFFFF"
            rx="2"
            stroke="#E8E0D0"
            stroke-width="1"/>

      <!-- Paper shadow -->
      <rect x="90" y="115" width="7" height="45"
            fill="#F5F0E8"
            opacity="0.5"
            rx="2"/>

      <!-- Fold line -->
      <line x1="100" y1="115" x2="100" y2="160"
            stroke="#E8E0D0"
            stroke-width="0.6"
            opacity="0.4"/>

      <!-- Text lines -->
      <line x1="93" y1="122" x2="107" y2="122"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.5"
            stroke-linecap="round"/>
      <line x1="93" y1="128" x2="107" y2="128"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.5"
            stroke-linecap="round"/>
      <line x1="93" y1="134" x2="105" y2="134"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.45"
            stroke-linecap="round"/>
      <line x1="93" y1="140" x2="107" y2="140"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.45"
            stroke-linecap="round"/>
      <line x1="93" y1="146" x2="104" y2="146"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.4"
            stroke-linecap="round"/>
      <line x1="93" y1="152" x2="106" y2="152"
            stroke="#C8B590"
            stroke-width="1"
            opacity="0.4"
            stroke-linecap="round"/>
    </g>

    <!-- Edge details -->
    <g>
      <!-- Top edges -->
      <path d="M 35 75 C 50 70, 75 75, 100 80"
            stroke="#5D2E10"
            stroke-width="1.8"
            fill="none"
            opacity="0.4"
            stroke-linecap="round"/>
      <path d="M 100 80 C 125 75, 150 70, 165 75"
            stroke="#5D2E10"
            stroke-width="1.8"
            fill="none"
            opacity="0.4"
            stroke-linecap="round"/>

      <!-- Bottom edges -->
      <path d="M 50 125 C 70 132, 85 128, 100 120"
            stroke="#5D2E10"
            stroke-width="2"
            fill="none"
            opacity="0.35"
            stroke-linecap="round"/>
      <path d="M 100 120 C 115 128, 130 132, 150 125"
            stroke="#5D2E10"
            stroke-width="2"
            fill="none"
            opacity="0.35"
            stroke-linecap="round"/>

      <!-- Texture spots -->
      <circle cx="55" cy="95" r="2" fill="#D48A42" opacity="0.25"/>
      <circle cx="65" cy="110" r="1.5" fill="#D48A42" opacity="0.25"/>
      <circle cx="145" cy="95" r="2" fill="#A65628" opacity="0.3"/>
      <circle cx="135" cy="110" r="1.5" fill="#A65628" opacity="0.3"/>
    </g>

  </g>
</svg>
