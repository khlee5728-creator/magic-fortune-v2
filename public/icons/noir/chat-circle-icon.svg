<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark gray-blue gradient for cat (matching Noir) -->
    <radialGradient id="catGray" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#50596d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3f4a5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </radialGradient>

    <!-- Gold gradient for crown -->
    <linearGradient id="crownGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>

    <!-- Blue glow for background -->
    <radialGradient id="blueGlow">
      <stop offset="0%" style="stop-color:#bfdbfe;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#93c5fd;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="50" cy="50" r="40" fill="url(#blueGlow)" opacity="0.4"/>

  <!-- Cat silhouette (sitting pose, like a king on throne) -->
  <g filter="url(#glow)">
    <!-- Cat head (round) -->
    <circle cx="50" cy="42" r="18" fill="url(#catGray)" stroke="#1a1f2e" stroke-width="1.5"/>

    <!-- Cat ears (pointed, alert) -->
    <path d="M 38 30 L 32 20 L 42 28 Z" fill="url(#catGray)" stroke="#1a1f2e" stroke-width="1.5"/>
    <path d="M 62 30 L 68 20 L 58 28 Z" fill="url(#catGray)" stroke="#1a1f2e" stroke-width="1.5"/>

    <!-- Inner ear detail (pink-ish dark) -->
    <path d="M 38 28 L 35 22 L 40 27 Z" fill="#4a3a4f" opacity="0.6"/>
    <path d="M 62 28 L 65 22 L 60 27 Z" fill="#4a3a4f" opacity="0.6"/>

    <!-- Cat body (rounded, sitting) -->
    <ellipse cx="50" cy="68" rx="20" ry="16" fill="url(#catGray)" stroke="#1a1f2e" stroke-width="1.5"/>

    <!-- Cat tail (curved, elegant) -->
    <path d="M 68 70 Q 75 65 78 60 Q 80 55 80 50"
          stroke="url(#catGray)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M 68 70 Q 75 65 78 60 Q 80 55 80 50"
          stroke="#1a1f2e" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Cat eyes (confident, half-closed like a boss) -->
    <!-- Left eye -->
    <ellipse cx="43" cy="40" rx="2.5" ry="3" fill="#2a5850"/>
    <ellipse cx="42" cy="39" rx="1" ry="1.5" fill="#d0f0e8" opacity="0.8"/>

    <!-- Right eye -->
    <ellipse cx="57" cy="40" rx="2.5" ry="3" fill="#2a5850"/>
    <ellipse cx="56" cy="39" rx="1" ry="1.5" fill="#d0f0e8" opacity="0.8"/>

    <!-- Cat nose (small triangle) -->
    <path d="M 50 46 L 48 48 L 52 48 Z" fill="#6b5168"/>

    <!-- Whiskers (subtle) -->
    <line x1="35" y1="44" x2="28" y2="43" stroke="#50596d" stroke-width="1" opacity="0.6"/>
    <line x1="35" y1="47" x2="28" y2="48" stroke="#50596d" stroke-width="1" opacity="0.6"/>
    <line x1="65" y1="44" x2="72" y2="43" stroke="#50596d" stroke-width="1" opacity="0.6"/>
    <line x1="65" y1="47" x2="72" y2="48" stroke="#50596d" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Crown on cat's head (THE KEY ELEMENT!) -->
  <g filter="url(#glow)">
    <!-- Crown base -->
    <path d="M 36 28 L 38 18 L 42 24 L 46 16 L 50 24 L 54 16 L 58 24 L 62 18 L 64 28 Z"
          fill="url(#crownGold)" stroke="#f59e0b" stroke-width="1.5"/>

    <!-- Crown jewels/decorations -->
    <circle cx="38" cy="18" r="2" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46" cy="16" r="2.5" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="54" cy="16" r="2.5" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="62" cy="18" r="2" fill="#fef3c7" stroke="#fbbf24" stroke-width="0.8">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" begin="0.9s" repeatCount="indefinite"/>
    </circle>

    <!-- Center crown jewel (largest) -->
    <circle cx="50" cy="24" r="2" fill="#fbbf24" opacity="0.8"/>
    <circle cx="50" cy="24" r="1.2" fill="#fef3c7">
      <animate attributeName="r" values="1;1.5;1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Crown highlights (metallic shine) -->
    <path d="M 40 26 L 41 20 L 42 26" stroke="#fef3c7" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 48 24 L 48 18 L 49 24" stroke="#fef3c7" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 58 26 L 59 20 L 60 26" stroke="#fef3c7" stroke-width="1" fill="none" opacity="0.7"/>
  </g>

  <!-- Golden sparkles around crown (royal aura) -->
  <circle cx="30" cy="25" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="25" r="1.5" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="15" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="15" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Blue sparkles (cat's logic = unique thinking) -->
  <circle cx="20" cy="40" r="1.3" fill="#93c5fd">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="45" r="1.3" fill="#93c5fd">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Small stars (representing cat's "brilliant" logic) -->
  <g>
    <path d="M 75 32 L 76 35 L 78.5 35 L 76.5 36.5 L 77 39 L 75 37.5 L 73 39 L 73.5 36.5 L 71.5 35 L 74 35 Z"
          fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 25 32 L 26 35 L 28.5 35 L 26.5 36.5 L 27 39 L 25 37.5 L 23 39 L 23.5 36.5 L 21.5 35 L 24 35 Z"
          fill="#fbbf24" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Thought bubble dots (subtle - cat is always thinking) -->
  <g opacity="0.5">
    <circle cx="72" cy="55" r="2" fill="#bfdbfe"/>
    <circle cx="78" cy="58" r="1.5" fill="#bfdbfe"/>
    <circle cx="82" cy="62" r="1" fill="#bfdbfe"/>
  </g>

  <!-- Text indicator: "KING" or paw print symbol (optional subtle detail) -->
  <g opacity="0.3">
    <!-- Small paw print on body -->
    <circle cx="50" cy="68" r="2" fill="#93c5fd" opacity="0.3"/>
    <circle cx="48" cy="66" r="1" fill="#93c5fd" opacity="0.3"/>
    <circle cx="52" cy="66" r="1" fill="#93c5fd" opacity="0.3"/>
    <circle cx="47" cy="69" r="1" fill="#93c5fd" opacity="0.3"/>
    <circle cx="53" cy="69" r="1" fill="#93c5fd" opacity="0.3"/>
  </g>

  <!-- Gentle floating animation (majestic) -->
  <animateTransform
    attributeName="transform"
    type="translate"
    values="0 0; 0 -2; 0 0"
    dur="3s"
    repeatCount="indefinite"/>
</svg>
