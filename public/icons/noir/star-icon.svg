<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Blue gradient for star -->
    <linearGradient id="starBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="starGlow">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow (pulsing) -->
  <circle cx="50" cy="50" r="45" fill="url(#starGlow)" opacity="0.5">
    <animate attributeName="r" values="40;48;40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Main star - 8 pointed (4 long + 4 short) with gradient depth -->
  <g filter="url(#glow)">
    <!-- Long rays (4 main points) with enhanced gradient -->
    <defs>
      <linearGradient id="rayGradientV" x1="50%" y1="0%" x2="50%" y2="100%">
        <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#93c5fd;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="rayGradientH" x1="0%" y1="50%" x2="100%" y2="50%">
        <stop offset="0%" style="stop-color:#dbeafe;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#93c5fd;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
      </linearGradient>
    </defs>

    <!-- Long rays with light spreading effect -->
    <path d="M 50 15 L 52 45 L 50 50 L 48 45 Z" fill="url(#rayGradientV)"/>
    <path d="M 50 14 L 51 45 L 50 50 L 49 45 Z" fill="#ffffff" opacity="0.4"/>

    <path d="M 85 50 L 55 52 L 50 50 L 55 48 Z" fill="url(#rayGradientH)"/>
    <path d="M 86 50 L 55 51 L 50 50 L 55 49 Z" fill="#ffffff" opacity="0.4"/>

    <path d="M 50 85 L 52 55 L 50 50 L 48 55 Z" fill="url(#rayGradientV)"/>
    <path d="M 50 86 L 51 55 L 50 50 L 49 55 Z" fill="#ffffff" opacity="0.4"/>

    <path d="M 15 50 L 45 52 L 50 50 L 45 48 Z" fill="url(#rayGradientH)"/>
    <path d="M 14 50 L 45 51 L 50 50 L 45 49 Z" fill="#ffffff" opacity="0.4"/>

    <!-- Short rays (4 diagonal points) with enhanced depth -->
    <path d="M 72 28 L 54 46 L 50 50 L 46 46 Z" fill="url(#starBlue)" opacity="0.9"/>
    <path d="M 72 72 L 54 54 L 50 50 L 54 46 Z" fill="url(#starBlue)" opacity="0.9"/>
    <path d="M 28 72 L 46 54 L 50 50 L 46 46 Z" fill="url(#starBlue)" opacity="0.9"/>
    <path d="M 28 28 L 46 46 L 50 50 L 54 46 Z" fill="url(#starBlue)" opacity="0.9"/>
  </g>

  <!-- Center core (3-layer pulsing) -->
  <circle cx="50" cy="50" r="12" fill="url(#starBlue)" filter="url(#glow)">
    <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Middle layer (bright blue) -->
  <circle cx="50" cy="50" r="8" fill="#93c5fd">
    <animate attributeName="r" values="7;9;7" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner bright core (white) -->
  <circle cx="50" cy="50" r="6" fill="#dbeafe">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>

  <circle cx="50" cy="50" r="3.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Enhanced light reflection -->
  <ellipse cx="48" cy="47" rx="3" ry="4" fill="#ffffff" opacity="0.7"/>
  <ellipse cx="47" cy="46" rx="1.5" ry="2" fill="#ffffff" opacity="0.9"/>

  <!-- Enhanced sparkles around (varied sizes) -->
  <circle cx="30" cy="25" r="1.5" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="30" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="70" r="1.3" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="75" r="1" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Additional sparkles -->
  <circle cx="20" cy="50" r="1.1" fill="#fde68a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="50" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="20" r="1.3" fill="#fde68a">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="80" r="1" fill="#fde68a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
