<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold gradient for spherical bell (radial for 3D effect) -->
    <radialGradient id="sphereGold" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </radialGradient>

    <!-- Bright highlight gradient -->
    <radialGradient id="goldHighlight" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="20%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#fde68a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>

    <!-- Dark shadow gradient -->
    <radialGradient id="sphereShadow" cx="70%" cy="70%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#b45309;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:0.9" />
    </radialGradient>

    <!-- Golden glow around bell -->
    <radialGradient id="bellGlow">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0" />
    </radialGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="50" cy="50" r="30" fill="url(#bellGlow)" opacity="0.5"/>

  <!-- Main spherical bell body -->
  <g filter="url(#glow)">
    <!-- Base sphere -->
    <circle cx="50" cy="50" r="22" fill="url(#sphereGold)"
            stroke="#d97706" stroke-width="1.5"/>

    <!-- Shadow layer for depth -->
    <circle cx="50" cy="50" r="22" fill="url(#sphereShadow)" opacity="0.5"/>

    <!-- Bright specular highlight (makes it look shiny and round) -->
    <ellipse cx="42" cy="42" rx="8" ry="10" fill="url(#goldHighlight)" opacity="0.9"/>

    <!-- Secondary highlight -->
    <ellipse cx="40" cy="40" rx="4" ry="5" fill="#ffffff" opacity="0.8"/>
    <circle cx="39" cy="39" r="2" fill="#ffffff" opacity="1"/>

    <!-- Additional soft highlight on opposite side -->
    <ellipse cx="58" cy="56" rx="3" ry="4" fill="#fef3c7" opacity="0.3"/>
  </g>

  <!-- Bell slit (opening at bottom where sound comes out) -->
  <g opacity="0.8">
    <!-- Horizontal slit -->
    <ellipse cx="50" cy="62" rx="8" ry="1.5" fill="#1e293b" opacity="0.7"/>
    <ellipse cx="50" cy="62" rx="7" ry="1" fill="#0f172a" opacity="0.8"/>

    <!-- Vertical center line -->
    <rect x="49.5" y="56" width="1" height="8" fill="#1e293b" opacity="0.5"/>
  </g>

  <!-- Top ring/loop for hanging on collar -->
  <g>
    <!-- Ring loop (curved top) -->
    <path d="M 46 30 Q 50 24 54 30"
          stroke="url(#sphereGold)" stroke-width="3"
          fill="none" stroke-linecap="round"/>
    <path d="M 46 30 Q 50 24 54 30"
          stroke="#fde68a" stroke-width="1.5"
          fill="none" stroke-linecap="round"/>

    <!-- Ring connection points -->
    <circle cx="46" cy="30" r="2.5" fill="url(#sphereGold)" stroke="#fbbf24" stroke-width="0.5"/>
    <circle cx="54" cy="30" r="2.5" fill="url(#sphereGold)" stroke="#fbbf24" stroke-width="0.5"/>

    <!-- Highlights on ring -->
    <circle cx="45" cy="29" r="0.8" fill="#fef3c7" opacity="0.9"/>
    <circle cx="53" cy="29" r="0.8" fill="#fef3c7" opacity="0.9"/>
  </g>

  <!-- Inner small ball (clapper) - visible through the sphere -->
  <circle cx="50" cy="52" r="2.5" fill="#f59e0b" opacity="0.4"/>
  <circle cx="49" cy="51" r="1" fill="#fde68a" opacity="0.6"/>

  <!-- Decorative pattern dots on sphere surface -->
  <circle cx="45" cy="48" r="1" fill="#d97706" opacity="0.3"/>
  <circle cx="55" cy="52" r="1.2" fill="#d97706" opacity="0.3"/>
  <circle cx="50" cy="56" r="0.8" fill="#d97706" opacity="0.4"/>

  <!-- Sound waves (gentle animation) -->
  <g opacity="0.7">
    <!-- Left waves -->
    <path d="M 24 48 Q 22 50 24 52"
          stroke="#fbbf24" stroke-width="1.8"
          stroke-linecap="round" fill="none">
      <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -4 0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 18 48 Q 16 50 18 52"
          stroke="#fbbf24" stroke-width="1.5"
          stroke-linecap="round" fill="none">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; -6 0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </path>

    <!-- Right waves -->
    <path d="M 76 48 Q 78 50 76 52"
          stroke="#fbbf24" stroke-width="1.8"
          stroke-linecap="round" fill="none">
      <animate attributeName="opacity" values="0;0.9;0" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 4 0" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 82 48 Q 84 50 82 52"
          stroke="#fbbf24" stroke-width="1.5"
          stroke-linecap="round" fill="none">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate"
                        values="0 0; 6 0" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Sparkles around the bell -->
  <circle cx="28" cy="38" r="1.5" fill="#fef3c7">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="42" r="1.2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="62" r="1" fill="#fef3c7">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="68" cy="58" r="1.3" fill="#fde68a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Additional sparkles -->
  <circle cx="35" cy="30" r="1.2" fill="#fbbf24">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="65" cy="35" r="1.4" fill="#fbbf24">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="70" r="1.1" fill="#fef3c7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="68" r="1.3" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Gentle swing animation (subtle rotation) -->
  <animateTransform
    attributeName="transform"
    type="rotate"
    values="0 50 50; 3 50 50; 0 50 50; -3 50 50; 0 50 50"
    dur="3s"
    repeatCount="indefinite"/>
</svg>
