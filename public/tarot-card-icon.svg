<svg width="200" height="280" viewBox="0 0 200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card background gradient -->
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>

    <!-- Purple glow -->
    <radialGradient id="purpleGlow">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>

    <!-- Gold gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>

    <!-- Pattern glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="10" y="10" width="180" height="260" rx="12" fill="url(#cardBg)"
        stroke="url(#goldGradient)" stroke-width="3"/>

  <!-- Inner glow -->
  <rect x="10" y="10" width="180" height="260" rx="12" fill="url(#purpleGlow)" opacity="0.3"/>

  <!-- Decorative border -->
  <rect x="25" y="25" width="150" height="230" rx="8"
        fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.6"/>

  <!-- Corner ornaments -->
  <!-- Top left -->
  <path d="M 35 35 L 45 35 L 35 45 Z" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="40" cy="40" r="2" fill="#fde68a"/>

  <!-- Top right -->
  <path d="M 165 35 L 155 35 L 165 45 Z" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="160" cy="40" r="2" fill="#fde68a"/>

  <!-- Bottom left -->
  <path d="M 35 245 L 45 245 L 35 235 Z" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="40" cy="240" r="2" fill="#fde68a"/>

  <!-- Bottom right -->
  <path d="M 165 245 L 155 245 L 165 235 Z" fill="url(#goldGradient)" opacity="0.7"/>
  <circle cx="160" cy="240" r="2" fill="#fde68a"/>

  <!-- Center mystical symbol - Sun and Moon -->
  <g filter="url(#glow)">
    <!-- Outer circle -->
    <circle cx="100" cy="100" r="40" fill="none"
            stroke="url(#goldGradient)" stroke-width="2.5" opacity="0.8"/>

    <!-- Sun rays (8 points) -->
    <line x1="100" y1="50" x2="100" y2="40" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="128.28" y1="71.72" x2="134.14" y2="65.86" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="150" y1="100" x2="160" y2="100" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="128.28" y1="128.28" x2="134.14" y2="134.14" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="100" y1="150" x2="100" y2="160" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="71.72" y1="128.28" x2="65.86" y2="134.14" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="100" x2="40" y2="100" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
    <line x1="71.72" y1="71.72" x2="65.86" y2="65.86" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>

    <!-- Inner sun -->
    <circle cx="100" cy="100" r="18" fill="#fbbf24" opacity="0.3"/>
    <circle cx="100" cy="100" r="12" fill="url(#goldGradient)"/>
  </g>

  <!-- Crescent moon overlay -->
  <g filter="url(#glow)">
    <path d="M 90 100 Q 85 90, 90 80 Q 100 85, 90 100 Z"
          fill="#c4b5fd" opacity="0.7"/>
  </g>

  <!-- Stars around center -->
  <g opacity="0.8">
    <path d="M 100 175 L 102 181 L 108 181 L 103 185 L 105 191 L 100 187 L 95 191 L 97 185 L 92 181 L 98 181 Z"
          fill="url(#goldGradient)">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 100 183" to="360 100 183"
                        dur="20s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Mystical text "TAROT" in decorative way -->
  <text x="100" y="220" font-family="serif" font-size="18" font-weight="bold"
        fill="url(#goldGradient)" text-anchor="middle" letter-spacing="4">
    TAROT
  </text>

  <!-- Bottom decorative line -->
  <line x1="60" y1="230" x2="140" y2="230" stroke="url(#goldGradient)"
        stroke-width="1" opacity="0.5"/>

  <!-- Floating sparkles with animation -->
  <circle cx="50" cy="120" r="1.5" fill="#fde68a">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="140" r="2" fill="#fde68a">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="60" r="1.5" fill="#c4b5fd">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="125" cy="220" r="1.8" fill="#c4b5fd">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Subtle texture dots -->
  <g opacity="0.2">
    <circle cx="110" cy="110" r="0.8" fill="#fde68a"/>
    <circle cx="90" cy="90" r="0.8" fill="#fde68a"/>
    <circle cx="60" cy="180" r="0.8" fill="#fde68a"/>
    <circle cx="140" cy="200" r="0.8" fill="#fde68a"/>
  </g>
</svg>
